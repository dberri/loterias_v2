name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test:
    name: Tests (PostgreSQL)
    runs-on: ubuntu-latest

    services:
      postgres:
        # Must track the major version in docker-compose.yml and, once
        # provisioned, Laravel Cloud. Parity is the requirement (INFRA-06).
        image: postgres:17
        env:
          POSTGRES_DB: testing
          POSTGRES_USER: sail
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -q -d testing -U sail"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: testing
      DB_USERNAME: sail
      DB_PASSWORD: password

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: pdo, pdo_pgsql, pgsql, mbstring, bcmath, intl, zip
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Lint (Pint)
        run: vendor/bin/pint --test

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run test suite
        run: php artisan test
